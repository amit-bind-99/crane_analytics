version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crane_analytics
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
    volumes:
      # Mount local data/ folder so you can drop the Excel file in without rebuilding
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
