# Railway deployment configuration
# https://docs.railway.app/reference/config-as-code

[build]
# Railway auto-detects Dockerfile; this section is optional but explicit
dockerfile = "Dockerfile"

[deploy]
startCommand = "sh -c 'exec gunicorn --bind 0.0.0.0:${PORT:-5000} --workers 2 --timeout 120 app:app'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "crane-analytics"
